app-id: org.linphone.linphone
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: linphone
rename-desktop-file: linphone.desktop
rename-icon: linphone
finish-args:
  # NOTE: As long as /dev/video is directly needed and neither the Camera portal nor device=usb helps (also used for USB microphones)
  - --device=all
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.ScreenSaver
modules:
  # Development tools from:
  # https://github.com/BelledonneCommunications/linphone-desktop/blob/master/docker-files/bc-dev-ubuntu-22-04-lts
  ## Python dependencies
  - name: python3-pystache-six
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} pystache six --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/fa/78/ffd13a516219129cef6a754a11ba2a1c0d69f1e281af4f6bca9ed5327219/pystache-0.6.8-py3-none-any.whl
        sha256: 7211e000974a6e06bce2d4d5cad8df03bcfffefd367209117376e4527a1c3cb8
        x-checker-data:
          name: pystache
          packagetype: bdist_wheel
          type: pypi
      - type: file
        url: https://files.pythonhosted.org/packages/b7/ce/149a00dd41f10bc29e5921b496af8b574d8413afcd5e30dfa0ed46c2cc5e/six-1.17.0-py2.py3-none-any.whl
        sha256: 4721f391ed90541fddacab5acf947aa0d3dc7d27b2e1e8eda2be8970586c3274
        x-checker-data:
          name: six
          packagetype: bdist_wheel
          type: pypi
    cleanup:
      - "*"
  ## Binary dependencies
  - name: yasm
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/yasm/yasm/releases/download/v1.3.0/yasm-1.3.0.tar.gz
        sha256: 3dce6601b495f5b3d45b59f7d2492a340ee7e84b5beca17e48f862502bd5603f
      # Patches from https://sources.debian.org/patches/yasm/1.3.0-8/
      - type: patch
        paths:
          - patches/yasm/0000-gcc-15.patch
          - patches/yasm/1000-x86-dir-cpu-CVE-2023-29579.patch
          - patches/yasm/100_ytasm_parsing_error.diff
          - patches/yasm/1010-nasm-pp-no-env-CVE-2021-33464.patch
          - patches/yasm/1020-hash-null-CVE-2021-33456.patch
          - patches/yasm/autoconf.patch
    cleanup:
      - "*"
  - "shared-modules/glu/glu-9.json"
  - "shared-modules/glew/glew.json"
  # Linphone
  - name: linphone
    buildsystem: cmake-ninja
    builddir: true
    cleanup:
      - "*.cmake"
      - "*.a"
      - /bin/cjpeg
      - /bin/djpeg
      - /bin/jpegtran
      - /bin/CreateDOMDocument
      - /bin/DOMCount
      - /bin/DOMPrint
      - /bin/EnumVal
      - /bin/MemParse
      - /bin/PParse
      - /bin/PSVIWriter
      - /bin/Redirect
      - /bin/SAX2Count
      - /bin/SAX2Print
      - /bin/SAXCount
      - /bin/SAXPrint
      - /bin/SCMPrint
      - /bin/SEnumVal
      - /bin/StdInParse
      - /bin/XInclude
      - /bin/yuvconvert
      - /include
      - /cmake
      - /lib/cmake
      - /lib/pkgconfig
      - /lib/BCMatroska2
      - /lib/BCToolbox
      - /lib/BCUnit
      - /lib/BV16
      - /lib/BZRTP
      - /lib/BelCard
      - /lib/LibLinphone
      - /lib/Lime
      - /lib/LinphoneCxx
      - /lib/Mediastreamer2
      - /lib/Ortp
      - /lib/PostQuantumCryptoEngine
      - /lib/SQLITE3
      - /lib/YUV
      - /lib/decaf
      - /lib/doc
      - /lib/man
      - /lib/mbedtls
      - /lib/xerces-c
      - /share/doc
      - /share/man
      - /lib/pkgconfig
      - /share/BCMatroska2
      - /share/BCToolbox
      - /share/BCToolbox/cmake
      - /share/BCToolbox/cmake/gitversion.h.in
      - /share/BCUnit
      - /share/BCUnit/BCUnit-List.dtd
      - /share/BCUnit/BCUnit-List.xsl
      - /share/BCUnit/BCUnit-Run.dtd
      - /share/BCUnit/BCUnit-Run.xsl
      - /share/BCUnit/Memory-Dump.dtd
      - /share/BCUnit/Memory-Dump.xsl
      - /share/BV16
      - /share/BZRTP
      - /share/BelCard
      - /share/GSM
      - /share/LibLinphone
      - /share/Lime
      - /share/LinphoneCxx
      - /share/Mediastreamer2
      - /share/Ortp
      - /share/PostQuantumCryptoEngine
      - /share/SQLITE3
      - /share/Speex
      - /share/decaf
      - /share/libjpeg-turbo
      - /share/mbedtls
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_OPUS=OFF
      - -DBUILD_LIBJPEGTURBO=OFF
      - -DBUILD_LIBVPX=OFF
      - -DBUILD_LIBXML2=OFF
      - -DBUILD_SPEEX=OFF
      - -DBUILD_ZLIB=OFF
      - -DBUILD_DAV1D=OFF
      - -DBUILD_AOM=OFF
      - -DENABLE_AV1=ON # Otherwise forced OFF, when BUILD_DAV1D=OFF, and this needs, and also forces ENABLE_VIDEO=ON
      # <WORKAROUND BUGGY-FILE="FindDav1d.cmake,FindAom.cmake">
      - -D_Dav1d_INCLUDE_DIRS=/usr/include/
      - -D_Dav1d_LIBRARY=/usr/lib/x86_64-linux-gnu/libdav1d.so
      - -D_Aom_INCLUDE_DIRS=/usr/include/
      - -D_Aom_LIBRARY=/usr/lib/x86_64-linux-gnu/libaom.so
      # </WORKAROUND>
      - -DENABLE_DOC=OFF
      - -DENABLE_FFMPEG=OFF # <- Not needed by mediastreamer2 anymore and just causes compilation issues 10+ years old (n0.10.2) baseline
      - -DENABLE_GPL_THIRD_PARTIES=ON
      - -DENABLE_NON_FREE_CODECS=ON
      - -DENABLE_NON_FREE_FEATURES=ON #<- implied by DENABLE_NON_FREE_CODECS
      - -DENABLE_OPENH264=ON #<- implied by ENABLE_VIDEO=ON
      - -DENABLE_EMBEDDED_OPENH264=ON
      - -DENABLE_VIDEO=ON
      - -DENABLE_PQCRYPTO=ON
      - -DLINPHONEAPP_INSTALL_PREFIX=/app/
      - -DLINPHONESDK_PLATFORM=Desktop
      # While this seems redundandt, without this `bctoolbox` is not buildable from archive, as cmake would try to use git to read the repo
      - -DLINPHONESDK_VERSION=5.4.106 # Also Linphone-desktop needs this
      # While this seems redundandt, without this `bctoolbox` is not buildable from archive, as cmake would try to use git to read the repo
      - -DLINPHONEAPP_VERSION=6.1.2
      - -DGIT_BRANCH_NAME=6.1.2
      # Option added by `CMake-flatpak-packaging.patch`
      - -DFLATPAK_ID=org.linphone.linphone
    post-install:
      - desktop-file-edit --set-key="Icon" --set-value="${FLATPAK_ID}" ${FLATPAK_DEST}/share/applications/linphone.desktop
